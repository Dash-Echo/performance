// ── FUNIL ─────────────────────────────────────────────────────────────────────
function classifyFunnel(name = "") {
  const n = name.toLowerCase();
  if (n.includes("topo") || n.includes("awareness") || n.includes("tráfego") || n.includes("trafego") || n.includes("engajamento") || n.includes("alcance") || n.includes("video") || n.includes("vídeo") || n.includes("ytb") || n.includes("youtube")) return "topo";
  if (n.includes("meio") || n.includes("mf") || n.includes("consideração") || n.includes("consideracao") || n.includes("display") || n.includes("demand") || n.includes("pmax")) return "meio";
  return "fundo";
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pn = v => parseFloat(v) || 0;
const fmt = {
  brl:  v => `R$ ${pn(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})}`,
  brl2: v => `R$ ${pn(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`,
  pct:  v => `${pn(v).toFixed(2)}%`,
  num:  v => pn(v).toLocaleString("pt-BR"),
  k:    v => pn(v)>=1000000?`${(pn(v)/1000000).toFixed(1)}M`:pn(v)>=1000?`${(pn(v)/1000).toFixed(0)}k`:String(Math.round(pn(v))),
};

async function fetchSheet(range) {
  const url = `${SHEETS_BASE}/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const [headers, ...rows] = data.values || [];
  if (!headers) return [];
  return rows.map(row => Object.fromEntries(headers.map((h,i)=>[h,row[i]??""])));
}

    try {
      setLoading(true); setError(null);
      const [camp, daily] = await Promise.all([fetchSheet("campaigns!A:O"), fetchSheet("daily!A:G")]);
      const latest = {};
      camp.forEach(r=>{ if(r.campaign_id&&(!latest[r.campaign_id]||r.date>latest[r.campaign_id].date)) latest[r.campaign_id]=r; });
      const norm = Object.values(latest).map(r=>({...r,budget:pn(r.budget),impressions:pn(r.impressions),clicks:pn(r.clicks),conversions:pn(r.conversions),spend:pn(r.spend),ctr:pn(r.ctr),cpc:pn(r.cpc),cpa:pn(r.cpa),roas:pn(r.roas),reach:pn(r.reach)}));
      if(norm.length){setCampaigns(norm);setIsDemo(false);}
      if(daily.length) setDailyRaw(daily);
      setLastUpdate(new Date());
    } catch(e){ setError(e.message); setIsDemo(true); }
    finally{ setLoading(false); }
  },[]);

  useEffect(()=>{ loadData(); const t=setInterval(loadData,15*60*1000); return ()=>clearInterval(t); },[]);

  const inRange = d => !d || (d>=dateFrom && d<=dateTo);

  const filteredCamps = campaigns

  const filteredDaily = dailyRaw.filter(r=>r.date&&inRange(r.date));

  const tot = filteredCamps.reduce((acc,c)=>({
    spend:acc.spend+pn(c.spend), impressions:acc.impressions+pn(c.impressions),
    clicks:acc.clicks+pn(c.clicks), conversions:acc.conversions+pn(c.conversions), reach:acc.reach+pn(c.reach)
  }),{spend:0,impressions:0,clicks:0,conversions:0,reach:0});

  const avgCpc = tot.clicks>0?tot.spend/tot.clicks:0;
  const avgCpl = tot.conversions>0?tot.spend/tot.conversions:0;
  const avgCtr = tot.impressions>0?(tot.clicks/tot.impressions*100):0;
  const avgRoas = filteredCamps.length?filteredCamps.reduce((s,c)=>s+pn(c.roas),0)/filteredCamps.length:0;

    const cs=filteredCamps.filter(c=>c.platform===plat);
    const sp=cs.reduce((s,c)=>s+pn(c.spend),0);
    const cv=cs.reduce((s,c)=>s+pn(c.conversions),0);
    return {plat,spend:sp,conversions:cv,cpl:cv>0?sp/cv:0,share:tot.spend>0?sp/tot.spend*100:0};

  const byFunnel = ["topo","meio","fundo"].map(f=>{
    const cs=filteredCamps.filter(c=>classifyFunnel(c.campaign_name)===f);
    return {f,spend:cs.reduce((s,c)=>s+pn(c.spend),0),conv:cs.reduce((s,c)=>s+pn(c.conversions),0),count:cs.length};

  const totalFSpend = byFunnel.reduce((s,f)=>s+f.spend,0);

  const trendData = (()=>{

    filteredDaily.forEach(r=>{

    return Object.values(m).sort((a,b)=>a.day.localeCompare(b.day));

  };

              <KpiCard label="Leads Mídia Paga (Jun)" value={fmt.num(getVal(lmp,5))} sub="Salesforce · Junho 2026" accent={C.verde} icon="📥"/>
              <KpiCard label="Leads Totais (Jun)" value={fmt.num(getVal(ltot,5))} sub="Todas as fontes" accent={C.azulL} icon="👥"/>
              <KpiCard label="CPL" value={String(getVal(cpl,5)||"—").includes("R$")?String(getVal(cpl,5)):fmt.brl2(getVal(cpl,5))} sub="Custo por lead" accent={C.amarelo} icon="💵"/>
              <KpiCard label="Tx Conversão LP" value={String(getVal(txLP,5)||"—")} sub="Landing page" accent={C.laranja} icon="🔄"/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px 22px"}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>Leads Mídia Paga × Investimento</div>
                <div style={{fontSize:10,color:C.muted,marginBottom:14}}>Correlação mês a mês</div>
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={meses.slice(0,6).map((m,i)=>({mes:m,leads:pn(getVal(lmp,i)),invest:pn(byPlat.reduce((s,b)=>s+b.spend,0))/6}))} margin={{top:0,right:4,left:-18,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                    <XAxis dataKey="mes" tick={{fill:C.muted,fontSize:10}} tickLine={false} axisLine={false}/>
                    <YAxis tick={{fill:C.muted,fontSize:10}} tickLine={false} axisLine={false}/>
                    <Tooltip content={<TT/>}/>
                    <Bar dataKey="leads" name="Leads" fill={C.verde} radius={[3,3,0,0]} maxBarSize={20}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px 22px"}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>Métricas Mensais</div>
                <div style={{fontSize:10,color:C.muted,marginBottom:14}}>Visão consolidada por mês</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {meses.slice(0,6).map((m,i)=>{
                    const leads = pn(getVal(lmp,i));
                    const maxL = Math.max(...meses.slice(0,6).map((_,j)=>pn(getVal(lmp,j))));
                    return <div key={m}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:11,color:C.muted}}>{m}</span>
                        <span style={{fontSize:11,fontWeight:600,color:C.text}}>{leads} leads</span>
                      </div>
                      <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:3,width:`${maxL>0?leads/maxL*100:0}%`,background:`linear-gradient(90deg,${C.azulL},${C.verde})`}}/>
                      </div>
                    </div>;
                  })}
                </div>
              </div>
            </div>
          </>;
        })()}

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,fontWeight:700}}>Dados Completos</div>
            <div style={{fontSize:10,color:C.muted}}>Planilha importada — leitura completa</div>
          </div>
          <div style={{overflowX:"auto",maxHeight:360,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead style={{position:"sticky",top:0}}>
                <tr style={{background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
                  {spHeaders.map((h,i)=><th key={i} style={{padding:"8px 12px",textAlign:"left",fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h||`Col ${i+1}`}</th>)}
                </tr>
              </thead>
              <tbody>
                {spBody.slice(0,60).map((row,i)=>(
                  <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
                    {spHeaders.map((_,j)=><td key={j} style={{padding:"7px 12px",fontSize:11,color:j===0||j===4?C.text:C.muted,whiteSpace:"nowrap"}}>{row[j]||""}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </>}
    </>}

    </div>

    <div style={{textAlign:"center",fontSize:9,color:C.dim,padding:"14px 0 22px",letterSpacing:"0.08em",textTransform:"uppercase"}}>
      ⚡ Echoenergia · Media Performance Dashboard · {isDemo?"Modo Demonstração":"Dados via Google Sheets · Atualização 15 min"}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
